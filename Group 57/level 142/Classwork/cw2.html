<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Real-time Character Counter</title>
    <link rel="stylesheet" href="cw2.css">
</head>

<body>

    <div class="container">

        <h2>Real-time Character Counter</h2>

        <textarea id="textarea" placeholder="Please write your text here..." maxlength="50"></textarea>

        <div class="counter">

            <p>Total Characters: <span id="total">0</span></p>

            <p>Remaining: <span id="remaining">50</span></p>

        </div>

    </div>

    <script src="cw2.js"></script>

</body>

</html>
