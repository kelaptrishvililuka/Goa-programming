<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="hw.css">
</head>

<body>

    <div class="calculator">
        <div id="display">0</div>

        <div class="buttons">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="op">/</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="op">*</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="op">-</button>

            <button>0</button>
            <button id="clear">C</button>
            <button id="equals">=</button>
            <button class="op">+</button>
        </div>
    </div>

    <script src="hw.js"></script>
</body>

</html>
